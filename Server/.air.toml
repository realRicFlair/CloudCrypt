# Air configuration for live reloading in development
root = "."
tmp_dir = "/tmp/air"

[build]
  bin = "/tmp/air/cloudcrypt"
  cmd = "go build -o /tmp/air/cloudcrypt ."
  delay = 1000
  exclude_dir = ["tmp", "vendor"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = "0s"
  send_interrupt = false
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
