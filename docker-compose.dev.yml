# Development overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Frontend uses Vite dev server with HMR.
# Backend source is bind-mounted for live reloading with Air.

services:
  backend:
    build:
      context: ./Server
      dockerfile: Dockerfile.dev
    environment:
      PORT: "8443"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173"
      FILE_MASTER_KEY: "${FILE_MASTER_KEY:-devsecret}"
      DB_PATH: "/data/cloudcrypt.db"
      DATA_DIR: "/data"
    volumes:
      - ./Server:/app/src
      - cloudcrypt-data:/data
    ports:
      - "8443:8443"

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile.dev
    environment:
      VITE_API_URL: "http://localhost:8443/api/"
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started
