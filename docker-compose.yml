services:
  backend:
    build:
      context: ./Server
      dockerfile: Dockerfile
    container_name: cloudcrypt-backend
    restart: unless-stopped
    environment:
      PORT: "8443"
      CORS_ALLOWED_ORIGINS: "http://localhost"
      FILE_MASTER_KEY: "${FILE_MASTER_KEY:-changeme}"
      DB_PATH: "/data/cloudcrypt.db"
      DATA_DIR: "/data"
    volumes:
      - cloudcrypt-data:/data
    networks:
      - cloudcrypt-net
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8443/health" ]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "/api/"
    container_name: cloudcrypt-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cloudcrypt-net

volumes:
  cloudcrypt-data:


networks:
  cloudcrypt-net:
    driver: bridge
